<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Tv Made By @_Kyrox</title>

  <!-- Meta Tags -->
  <meta name="description" content="Premium Live TV Streaming Experience">
  <meta name="keywords" content="live tv, streaming, channels, movies, sports, news">
  <meta name="author" content="Antigravity">
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Shaka Player -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">

  <style>
    /* ==================== MODERN DESIGN SYSTEM ==================== */
    :root {
      --primary: #00f2fe;
      --primary-glow: rgba(0, 242, 254, 0.4);
      --secondary: #4facfe;
      --accent: #ff007a;
      --bg-darker: #05070a;
      --bg-dark: #0a0d14;
      --bg-card: rgba(255, 255, 255, 0.03);
      --bg-glass: rgba(10, 13, 20, 0.85);
      --text-main: #ffffff;
      --text-dim: #94a3b8;
      --text-muted: #64748b;
      --border-glass: rgba(255, 255, 255, 0.08);
      --nav-height: 70px;
      --sidebar-width: 320px;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --font-main: 'Outfit', 'Inter', sans-serif;
    }

    /* ==================== RESET & BASE ==================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: var(--font-main);
      background-color: var(--bg-darker);
      color: var(--text-main);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(79, 172, 254, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(255, 0, 122, 0.05) 0%, transparent 40%);
      background-attachment: fixed;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-darker);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary-glow);
    }

    /* ==================== LAYOUT COMPONENTS ==================== */
    .app-root {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Header */
    .top-nav {
      height: var(--nav-height);
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-glass);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: -0.5px;
    }

    .brand i {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px var(--primary-glow));
    }

    .search-wrapper {
      flex: 1;
      max-width: 500px;
      margin: 0 2rem;
      position: relative;
    }

    .search-wrapper i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .search-wrapper input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      color: white;
      font-family: inherit;
      outline: none;
      transition: var(--transition);
    }

    .search-wrapper input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--primary);
      box-shadow: 0 0 15px var(--primary-glow);
    }

    .nav-actions {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .nav-link {
      color: var(--text-dim);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-link:hover, .nav-link.active {
      color: var(--primary);
    }

    .nav-link i {
      font-size: 1.1rem;
    }

    /* Category Bar */
    .category-bar {
      padding: 1rem 2rem;
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      scrollbar-width: none;
      background: var(--bg-darker);
      border-bottom: 1px solid var(--border-glass);
    }

    .category-bar::-webkit-scrollbar {
      display: none;
    }

    .cat-pill {
      white-space: nowrap;
      padding: 0.6rem 1.25rem;
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      border-radius: 50px;
      color: var(--text-dim);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }

    .cat-pill:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--text-dim);
    }

    .cat-pill.active {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: var(--bg-darker);
      border-color: transparent;
      font-weight: 700;
      box-shadow: 0 5px 15px var(--primary-glow);
    }

    /* Main Grid */
    .content-wrapper {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .main-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
    }

    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
    }

    /* Channel Card */
    .channel-card {
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
    }

    .channel-card:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--primary);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .card-banner {
      width: 100%;
      aspect-ratio: 16/9;
      background: #151921;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .card-banner img {
      width: calc(100% - 40px);
      height: calc(100% - 40px);
      object-fit: contain;
      filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
      transition: var(--transition);
    }

    .channel-card:hover .card-banner img {
      transform: scale(1.1);
    }

    .live-badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--accent);
      color: white;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .live-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .card-info {
      padding: 1.25rem;
    }

    .card-name {
      font-weight: 700;
      font-size: 1.05rem;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      font-size: 0.8rem;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Player Overlay */
    .player-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 2000;
      display: none;
      flex-direction: column;
      backdrop-filter: blur(10px);
    }

    .player-overlay.active {
      display: flex;
    }

    .player-header {
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-glass);
    }

    .close-player {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
    }

    .close-player:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: rotate(90deg);
    }

    .player-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .player-wrapper {
      width: 100%;
      max-width: 1280px;
      aspect-ratio: 16/9;
      background: black;
      position: relative;
      box-shadow: 0 0 100px rgba(0, 242, 254, 0.15);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    #videoElement {
      width: 100%;
      height: 100%;
    }

    .player-sidebar {
      width: 400px;
      background: var(--bg-dark);
      border-left: 1px solid var(--border-glass);
      display: none; /* Hidden by default, can be toggled */
    }

    /* Mobile Quick Nav (Floating Bottom) */
    .mobile-nav {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-glass);
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      display: none;
      gap: 2rem;
      z-index: 1500;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .search-wrapper {
        margin: 0 1rem;
      }
      .nav-actions span {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .top-nav {
        padding: 0 1rem;
      }
      .brand span {
        display: none;
      }
      .search-wrapper {
        margin: 0;
        max-width: none;
      }
      .nav-actions {
        gap: 1rem;
      }
      .mobile-nav {
        display: flex;
      }
      .category-bar {
        padding: 0.75rem 1rem;
      }
    }

    /* Error / Empty State */
    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 400px;
      text-align: center;
      color: var(--text-dim);
    }

    .error-container i {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      color: var(--accent);
    }

    .btn-reconnect {
      margin-top: 1.5rem;
      padding: 0.8rem 2rem;
      background: var(--primary);
      color: var(--bg-darker);
      border-radius: 50px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-reconnect:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px var(--primary-glow);
    }

    /* ==================== CUSTOM PLAYER UI ==================== */
    .player-wrapper {
      position: relative;
      cursor: pointer;
    }

    .custom-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      opacity: 0;
      transform: translateY(10px);
      transition: var(--transition);
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    .player-wrapper:hover .custom-controls {
      opacity: 1;
      transform: translateY(0);
    }

    .player-wrapper.controls-hidden .custom-controls {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
    }
    
    .player-wrapper.controls-hidden {
      cursor: none;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
    }

    .main-controls {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .control-btn {
      background: none;
      border: none;
      color: white;
      font-size: 1.25rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    .control-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--primary);
    }

    .volume-wrapper {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      width: 150px;
    }

    .volume-slider {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      outline: none;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: var(--primary);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px var(--primary-glow);
    }

    .seek-bar-container {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      position: relative;
      cursor: pointer;
    }

    .seek-bar-fill {
      position: absolute;
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 2px;
      width: 0%;
      box-shadow: 0 0 10px var(--primary-glow);
    }

    /* Hide Shaka Default UI */
    .shaka-controls-container, .shaka-spinner-container {
      display: none !important;
    }

    /* Buffering Glow (Extreme Optimization) */
    .player-wrapper.buffering::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--primary);
      box-shadow: 0 0 15px var(--primary-glow);
      animation: scan 1.5s linear infinite;
      z-index: 20;
    }

    @keyframes scan {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Diagnostic Error Overlay */
    .error-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .player-overlay.has-error .error-overlay {
      display: flex;
    }

    .debug-box {
      background: rgba(255, 255, 255, 0.05);
      padding: 2rem;
      border: 1px solid rgba(255, 0, 0, 0.3);
      border-radius: var(--radius-lg);
      text-align: center;
      max-width: 400px;
    }

    .debug-box i {
      font-size: 3rem;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .debug-box h3 {
      margin-bottom: 0.5rem;
    }

    .debug-box p {
      color: var(--text-dim);
      margin-bottom: 1.5rem;
    }
  </style>
</head>

<body>
  <div class="app-root">
    <!-- Top Navigation -->
    <nav class="top-nav">

      </a>

      <div class="search-wrapper">

    <!-- Category Bar -->
    <div class="category-bar" id="categoryBar">
      <div class="cat-pill active" data-category="all">All Channels</div>
      <!-- Categories will be injected here -->
    </div>

    <!-- Main Content -->
    <div class="content-wrapper">
      <main class="main-scroll">
        <div class="channel-grid" id="channelGrid">
          <!-- Channels will be injected here -->
        </div>
      </main>
    </div>
  </div>

  <!-- Player Overlay -->
  <div class="player-overlay" id="playerOverlay">
    <div class="player-header">
      <div style="display: flex; align-items: center; gap: 1rem;">
        <img src="" id="playingLogo" style="width: 40px; height: 40px; border-radius: 8px; object-fit: contain;">
        <div>
          <h2 id="playingTitle" style="font-size: 1.1rem; margin: 0;"></h2>
          <p id="playingMeta" style="font-size: 0.8rem; color: var(--text-dim); margin: 0;"></p>
        </div>
      </div>
      <div style="display: flex; gap: 1rem;">
        <div class="close-player" id="favToggleBtn">
          <i class="fas fa-heart"></i>
        </div>
        <div class="close-player" id="closePlayer">
          <i class="fas fa-times"></i>
        </div>
      </div>
    </div>
    
    <div class="player-content">
      <div class="player-wrapper" id="videoContainer">
        <video id="videoElement" autoplay playsinline></video>
        
        <!-- Custom Controls -->
        <div class="custom-controls" id="customControls">
          <div class="seek-bar-container" id="seekBar">
            <div class="seek-bar-fill" id="seekFill"></div>
          </div>
          <div class="control-row">
            <div class="main-controls">
              <button class="control-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
              <div class="volume-wrapper">
                <i class="fas fa-volume-up"></i>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="1">
              </div>
            </div>
            <div class="main-controls">
              <button class="control-btn" id="fullScreenBtn"><i class="fas fa-expand"></i></button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Ad placeholder -->
    <div style="padding: 1rem; display: flex; justify-content: center;">
      <div id="playerAd"></div>
    </div>
  </div>

  <!-- Mobile Quick Nav -->
  <div class="mobile-nav">
    <a href="#" class="nav-link active" onclick="location.reload()">
      <i class="fas fa-home"></i>
    </a>
    <a href="#" class="nav-link" id="mobileFavBtn">
      <i class="fas fa-heart"></i>
    </a>
    <a href="" target="_blank" class="nav-link">
      <i class="fab fa-discord"></i>
    </a>
  </div>

  <!-- ==================== ORIGINAL JAVASCRIPT (UNCHANGED) ==================== -->
  <script>
    // --- State Management ---
    let allChannels = [];
    let filteredChannels = [];
    let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    let currentCategory = 'all';
    let currentSearch = '';
    let player = null;

    // --- DOM Elements ---
    const channelGrid = document.getElementById('channelGrid');
    const categoryBar = document.getElementById('categoryBar');
    const mainSearch = document.getElementById('mainSearch');
    const playerOverlay = document.getElementById('playerOverlay');
    const videoElement = document.getElementById('videoElement');
    const videoContainer = document.getElementById('videoContainer');
    const closePlayer = document.getElementById('closePlayer');
    const playingLogo = document.getElementById('playingLogo');
    const playingTitle = document.getElementById('playingTitle');
    const playingMeta = document.getElementById('playingMeta');
    const favToggleBtn = document.getElementById('favToggleBtn');
    const homeBtn = document.getElementById('homeBtn');
    const favoritesBtn = document.getElementById('favoritesBtn');
    const mobileFavBtn = document.getElementById('mobileFavBtn');
    
    // Custom Control Elements
    const playPauseBtn = document.getElementById('playPauseBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const fullScreenBtn = document.getElementById('fullScreenBtn');
    const seekFill = document.getElementById('seekFill');
    const seekBar = document.getElementById('seekBar');

    // --- Initialization ---
    document.addEventListener('DOMContentLoaded', () => {
      initApp();
      setupShakaPlayer();
      setupEventListeners();
    });

    async function initApp() {
      try {
        const response = await fetch('https://raw.githubusercontent.com/anshxd1/jstr/refs/heads/main/newjstr.json');
        const data = await response.json();
        
        allChannels = data.filter(c => c.mpd).map(c => ({
          ...c,
          id: c.channel_id || `ch-${Math.random().toString(36).substr(2, 9)}`
        }));

        renderCategories();
        filterAndRender();
      } catch (error) {
        console.error('Failed to load channels:', error);
      }
    }

    // --- Shaka Player Setup (Extreme Speed) ---
    function setupShakaPlayer() {
      shaka.polyfill.installAll();
      player = new shaka.Player(videoElement);

      // EXTREME OPTIMIZATION CONFIG
      player.configure({
        streaming: {
          bufferingGoal: 2,         // World's Fastest: Just 2s buffer needed to start
          rebufferingGoal: 1,       // Quick recovery
          bufferBehind: 0,          // Don't waste memory
          lowLatencyMode: true,     // Vital for live streams
          jumpLargeGaps: true,      // Don't get stuck
          retryParameters: {
            timeout: 5000,          // Fail fast
            maxAttempts: 10,        // Retry many times
            baseDelay: 500,
            backoffFactor: 1.2
          }
        },
        abr: {
          enabled: true,
          initialBitrate: 500000    // Start with low quality for instant playback
        }
      });

      // Networking Filters
      player.getNetworkingEngine().registerRequestFilter((type, request) => {
        const channel = player.appData_channel;
        if (!channel) return;

        // On Desktop, Forbidden Headers (Referer/UA) are handled via URL bypass in playStream.
        // We only set them in headers for Mobile/Apps where it's allowed.
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMobile) {
          if (channel.referer) request.headers["Referer"] = channel.referer;
          if (channel.userAgent) request.headers["User-Agent"] = channel.userAgent;
        }

        if (channel.token && (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || 
                            type === shaka.net.NetworkingEngine.RequestType.SEGMENT)) {
          const sep = request.uris[0].includes("?") ? "&" : "?";
          if (!request.uris[0].includes("__hdnea__=")) request.uris[0] += sep + channel.token;
        }
      });

      // State Listeners (No Black Spinner)
      player.addEventListener('buffering', (e) => {
        if (e.fetching) {
          videoContainer.classList.add('buffering');
        } else {
          videoContainer.classList.remove('buffering');
        }
      });

      // Global control visibility timer
      let controlTimer;
      const hideControls = () => {
        if (videoElement.paused) return;
        videoContainer.classList.add('controls-hidden');
      };
      const showControls = () => {
        videoContainer.classList.remove('controls-hidden');
        clearTimeout(controlTimer);
        controlTimer = setTimeout(hideControls, 3000);
      };

      videoContainer.addEventListener('mousemove', showControls);
      videoContainer.addEventListener('touchstart', showControls);
      videoElement.addEventListener('play', showControls);
      videoElement.addEventListener('pause', showControls);

      player.addEventListener('error', () => {
        // Auto-reconnect if error occurs
        if (player.appData_channel) {
          setTimeout(() => playStream(player.appData_channel), 1000);
        }
      });
    }

    // --- Custom Control Logic ---
    function setupCustomControls() {
      playPauseBtn.onclick = () => {
        if (videoElement.paused) {
          videoElement.play();
          playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        } else {
          videoElement.pause();
          playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        }
      };

      videoElement.addEventListener('play', () => {
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
      });

      videoElement.addEventListener('pause', () => {
        playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
      });

      volumeSlider.oninput = (e) => {
        videoElement.volume = e.target.value;
      };

      fullScreenBtn.onclick = () => {
        if (!document.fullscreenElement) {
          videoContainer.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
      };

      // Progress/Seek Bar updates
      videoElement.addEventListener('timeupdate', () => {
        const percent = (videoElement.currentTime / videoElement.duration) * 100;
        seekFill.style.width = percent + '%';
      });

      seekBar.onclick = (e) => {
        const rect = seekBar.getBoundingClientRect();
        const pos = (e.pageX - rect.left) / rect.width;
        videoElement.currentTime = pos * videoElement.duration;
      };
    }

    async function playStream(channel) {
      if (!channel) return;
      playerOverlay.classList.remove('has-error');
      playerOverlay.classList.add('active');
      playingLogo.src = channel.logo;
      playingTitle.textContent = channel.name;
      playingMeta.textContent = channel.category || 'Live Stream';
      player.appData_channel = channel;

      let streamUrl = channel.mpd;
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      // On PC, we try multiple injection patterns to bypass header restrictions
      if (!isMobile && (channel.userAgent || channel.referer)) {
        const headers = [];
        if (channel.userAgent) headers.push(`User-Agent:${channel.userAgent}`);
        if (channel.referer) headers.push(`Referer:${channel.referer}`);
        const headerStr = headers.join('|');
        
        const sep = streamUrl.includes('?') ? '&' : '?';
        // Try multiple formats (some proxies use one, some the other)
        streamUrl += `${sep}headers=${encodeURIComponent(headerStr)}&ua=${encodeURIComponent(channel.userAgent || '')}&ref=${encodeURIComponent(channel.referer || '')}`;
      }

      player.configure({
        drm: channel.drm ? { clearKeys: channel.drm } : { clearKeys: {} },
        manifest: {
          retryParameters: { maxAttempts: 5 }
        }
      });

      try {
        await player.load(streamUrl);
        videoElement.play();
        updateFavBtnState(channel.id);
        playerOverlay.classList.remove('has-error');
      } catch (e) {
        console.error('Speed load failed:', e);
        playerOverlay.classList.add('has-error');
        const errorInfo = document.getElementById('errorInfo') || createErrorInfo();
        errorInfo.innerHTML = `
          <div class="debug-box">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Playback Failed</h3>
            <p>Code: <strong>${e.code}</strong> | Category: <strong>${e.category}</strong></p>
            <p><small>${e.message || 'Check your internet or DRM support'}</small></p>
            <button onclick="playStream(player.appData_channel)" class="btn-reconnect">Try Again</button>
          </div>
        `;
      }
    }

    function createErrorInfo() {
      const div = document.createElement('div');
      div.id = 'errorInfo';
      div.className = 'error-overlay';
      videoContainer.appendChild(div);
      return div;
    }

    // --- UI/Navigation Logic ---
    function renderCategories() {
      const categories = ['all', ...new Set(allChannels.map(c => c.category).filter(Boolean).sort())];
      categoryBar.innerHTML = categories.map(cat => `
        <div class="cat-pill ${cat === currentCategory ? 'active' : ''}" data-category="${cat}">
          ${cat.charAt(0).toUpperCase() + cat.slice(1)}
        </div>
      `).join('');

      document.querySelectorAll('.cat-pill').forEach(pill => {
        pill.onclick = () => {
          document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
          pill.classList.add('active');
          currentCategory = pill.dataset.category;
          filterAndRender();
        };
      });
    }

    function filterAndRender() {
      filteredChannels = allChannels.filter(c => {
        const matchesCat = currentCategory === 'all' || c.category === currentCategory;
        const matchesSearch = c.name.toLowerCase().includes(currentSearch.toLowerCase());
        return matchesCat && matchesSearch;
      });
      renderGrid(filteredChannels);
    }

    function renderGrid(channels) {
      channelGrid.innerHTML = channels.map(channel => `
        <div class="channel-card" data-id="${channel.id}">
          <div class="card-banner">
            <div class="live-badge">Live</div>
            <img src="${channel.logo}" alt="${channel.name}" loading="lazy" onerror="this.src='https://cdn-icons-png.flaticon.com/512/716/716429.png'">
          </div>
          <div class="card-info">
            <div class="card-name">${channel.name}</div>
            <div class="card-meta"><i class="fas fa-tag"></i> ${channel.category || 'General'}</div>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.channel-card').forEach(card => {
        card.onclick = () => {
          const channel = allChannels.find(c => c.id === card.dataset.id);
          playStream(channel);
        };
      });
    }

    function setupEventListeners() {
      setupCustomControls();
      mainSearch.oninput = (e) => {
        currentSearch = e.target.value;
        filterAndRender();
      };
      closePlayer.onclick = () => {
        playerOverlay.classList.remove('active');
        videoElement.pause();
        player.unload();
      };
      favToggleBtn.onclick = () => {
        if (player.appData_channel) toggleFavorite(player.appData_channel.id);
      };
      homeBtn.onclick = (e) => {
        e.preventDefault();
        currentCategory = 'all';
        currentSearch = '';
        mainSearch.value = '';
        filterAndRender();
        renderCategories();
        homeBtn.classList.add('active');
        favoritesBtn.classList.remove('active');
      };
      favoritesBtn.onclick = (e) => {
        e.preventDefault();
        const favChannels = allChannels.filter(c => favorites.includes(c.id));
        renderGrid(favChannels);
        favoritesBtn.classList.add('active');
        homeBtn.classList.remove('active');
      };
    }

    function toggleFavorite(id) {
      const idx = favorites.indexOf(id);
      if (idx === -1) favorites.push(id);
      else favorites.splice(idx, 1);
      localStorage.setItem('favorites', JSON.stringify(favorites));
      updateFavBtnState(id);
    }

    function updateFavBtnState(id) {
      const isFav = favorites.includes(id);
      favToggleBtn.innerHTML = isFav ? '<i class="fas fa-heart" style="color:var(--accent)"></i>' : '<i class="far fa-heart"></i>';
    }
  </script>
</body>

</html>
